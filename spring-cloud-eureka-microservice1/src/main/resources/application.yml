#spring.profiles.active: commons

server.port: 8800
spring.application.name: spring-cloud-microservice1

#eureka.client.serviceUrl.defaultZone: http://localhost:8761/eureka/
spring.cloud.nacos.discovery.server-addr: 127.0.0.1:8848

# LOGGING
logging.level.com.spring.cloud: DEBUG

## find Zipkin through service discovery
#spring.zipkin.baseUrl: https://spring-cloud-zipkin-server/
#spring.sleuth.sampler.probability: 1

# Ribbon load-balancer is now in maintenance mode, disabling Ribbon with Eureka Server and Client starters,
# using the Spring Cloud LoadBalancer
spring.cloud.loadbalancer.ribbon.enabled: false

# 发现客户端注册之后，Eureka默认认为是可用状态，不再检查发现客户端是否可用，开启发现客户端心跳检查，将发现客户端状态定时发送给Eureka
eureka.client.healthcheck.enabled: true

# change periodic heartbeat to the registry, default duration of 30 seconds
eureka.instance.leaseRenewalIntervalInSeconds: 10

# sentinel dashboard
spring.cloud.sentinel.transport.port: 8719
spring.cloud.sentinel.transport.dashboard: localhost:8081

# 打开 Sentinel 对 Feign 的支持
feign.sentinel.enabled: true

# web方式公开所有端点
management.endpoints.web.exposure.include: "*"
management.endpoint.health.show-details: always

