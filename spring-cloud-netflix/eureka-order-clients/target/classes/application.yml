spring:
  application:
    # Application name.
    name: eureka-order-clients

server:
  port: 8772

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost

feign:
  client:
    config:
      # 默认配置
      default:
        connectTimeout: 5000
        # 读取数据超时时间
        readTimeout: 20000
        loggerLevel: basic
  hystrix:
    # To enable Hystrix in Feign
    enabled: true